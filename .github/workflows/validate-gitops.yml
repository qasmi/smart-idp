---
name: Validate GitOps Manifests

on:
  pull_request:
    branches:
      - demo-luc

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: 'demo-cluster'
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
                level: warning
              comments:
                min-spaces-from-content: 1
          strict: false

      - name: Install kubeconform
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate Kubernetes/ArgoCD schemas
        run: |
          echo "🔍 Validating Kubernetes/ArgoCD schemas..."
          find demo-cluster -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -path "*/.git/*" \
            ! -path "*/.k8s-gen/*" \
            -exec sh -c '
              if grep -q "kind:" "$1" && grep -q "apiVersion:" "$1"; then
                echo "Validating: $1"
                kubeconform -strict -summary "$1" || exit 1
              fi
            ' _ {} \;
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
      - name: Render Helm charts from ArgoCD Applications
        run: bash .github/scripts/render-helm-charts.sh
      - name: Validate rendered Helm manifests
        run: |
          echo "🔍 Validating rendered Helm manifests..."
          if [ -d /tmp/rendered-manifests ] && [ "$(ls -A /tmp/rendered-manifests)" ]; then
            find /tmp/rendered-manifests -type f \( -name "*.yaml" -o -name "*.yml" \) \
              -exec sh -c '
                if grep -q "kind:" "$1" && grep -q "apiVersion:" "$1"; then
                  echo "Validating rendered manifest: $1"
                  kubeconform -strict -summary "$1" || exit 1
                fi
              ' _ {} \;
          else
            echo "  No rendered manifests to validate"
          fi
      - name: Prepare resources for Kyverno validation
        id: prepare-kyverno
        run: |
          echo "📋 Collecting Kubernetes resources for validation..."
          mkdir -p /tmp/kyverno-resources
          
          # Extract non-Application resources from demo-cluster (including .k8s-gen)
          # Handle multi-document YAML files properly
          find demo-cluster -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -path "*/.git/*" \
            -exec sh -c '
              file="$1"
              base_name=$(basename "$file" .yaml)
              base_name=$(basename "$base_name" .yml)
              # Use yq to extract all non-Application resources from multi-document files
              yq eval-all -N "select(.kind != \"Application\")" "$file" 2>/dev/null | \
              awk -v base="$base_name" '
                BEGIN { doc = ""; count = 0 }
                /^---$/ {
                  if (doc != "" && doc ~ /^apiVersion:/ && doc ~ /kind:/ && doc !~ /kind: Application/) {
                    print doc > "/tmp/kyverno-resources/" base "-" count ".yaml"
                    count++
                  }
                  doc = ""
                  next
                }
                { doc = doc $0 "\n" }
                END {
                  if (doc != "" && doc ~ /^apiVersion:/ && doc ~ /kind:/ && doc !~ /kind: Application/) {
                    print doc > "/tmp/kyverno-resources/" base "-" count ".yaml"
                  }
                }
              '
            ' _ {} \;
          
          # Copy rendered Helm manifests (excluding Applications)
          if [ -d /tmp/rendered-manifests ] && [ "$(ls -A /tmp/rendered-manifests)" ]; then
            find /tmp/rendered-manifests -type f \( -name "*.yaml" -o -name "*.yml" \) \
              -exec sh -c '
                if grep -q "kind:" "$1" && grep -q "apiVersion:" "$1" && ! grep -qE "^kind: Application$" "$1"; then
                  cp "$1" /tmp/kyverno-resources/
                  echo "  Found rendered: $1"
                fi
              ' _ {} \;
          fi
          
          # Remove empty extracted files
          find /tmp/kyverno-resources -name "*.extracted.yaml" -size 0 -delete 2>/dev/null || true
          
          echo "📊 Total resources collected for Kyverno validation:"
          resource_count=$(find /tmp/kyverno-resources -type f \( -name "*.yaml" -o -name "*.yml" \) 2>/dev/null | wc -l)
          echo "$resource_count"
          
          # Expand glob patterns to explicit file paths (space-separated)
          # The action expects space-separated file paths, not glob patterns
          if [ "$resource_count" -gt 0 ]; then
            resource_files=$(find /tmp/kyverno-resources -type f \( -name "*.yaml" -o -name "*.yml" \) | tr '\n' ' ' | sed 's/ $//')
            echo "resource_files=$resource_files" >> $GITHUB_OUTPUT
            echo "has_resources=true" >> $GITHUB_OUTPUT
            echo "📝 Resource files to validate:"
            echo "$resource_files" | tr ' ' '\n' | sed 's/^/  - /' | head -10
          else
            echo "has_resources=false" >> $GITHUB_OUTPUT
            echo "  ⚠️  No resources found for Kyverno validation"
          fi
      - name: Validate against Kyverno policies
        if: steps.prepare-kyverno.outputs.has_resources == 'true'
        uses: ckotzbauer/kyverno-test-action@v2
        with:
          resource-files: ${{ steps.prepare-kyverno.outputs.resource_files }}
          policy-files: 'https://raw.githubusercontent.com/qasmi/smart-idp/refs/heads/demo-luc/policies/pod-security.yaml'

      - name: Summary
        if: success()
        run: |
          echo ""
          echo "✅ All GitOps manifests validated successfully!"
          echo ""
          echo "📋 ArgoCD Applications found:"
          find demo-cluster -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -path "*/.git/*" \
            -exec grep -l "kind: Application" {} \; | sed 's/^/  ✓ /' || echo "  (none found)"